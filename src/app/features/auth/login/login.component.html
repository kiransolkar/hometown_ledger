<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <div class="login-title">
          <mat-icon class="title-icon">people</mat-icon>
          <h1>Member Dashboard</h1>
        </div>
      </mat-card-title>
      <mat-card-subtitle>Sign in to manage your members and transactions</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="login-content">
        <p class="welcome-text">Welcome! Please sign in with your Google account or continue as a guest.</p>

        @if (errorMessage) {
          <div class="error-message">
            <mat-icon>error</mat-icon>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <button
          mat-raised-button
          color="primary"
          class="google-signin-button"
          (click)="signInWithGoogle()"
          [disabled]="isLoading">
          <mat-icon>{{isLoading ? 'hourglass_empty' : 'login'}}</mat-icon>
          {{ isLoading ? 'Signing in...' : 'Sign in with Google' }}
        </button>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="guest-login-section">
          <mat-form-field appearance="outline" class="username-field">
            <mat-label>Enter a username</mat-label>
            <input
              matInput
              [(ngModel)]="guestUsername"
              placeholder="Choose a username"
              [disabled]="isLoading"
              (keyup.enter)="signInAsGuest()">
            <mat-icon matPrefix>person</mat-icon>
          </mat-form-field>

          <button
            mat-raised-button
            class="guest-signin-button"
            (click)="signInAsGuest()"
            [disabled]="isLoading || !guestUsername.trim()">
            <mat-icon>person_add</mat-icon>
            Continue as Guest
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
